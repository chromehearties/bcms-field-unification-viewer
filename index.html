<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIELD UNIFICATION VIEWER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #e2e5eb;
    --border2: #c8cdd8;
    --text: #1a1d27;
    --muted: #5a6278;
    --accent: #2c5fe0;
    --accent2: #1a4abf;
    --green: #059669;
    --amber: #d97706;
    --red: #dc2626;
    --purple: #7c3aed;
    --mono: "IBM Plex Mono", monospace;
    --sans: "IBM Plex Sans", sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    padding: 8px 0;
  }

  .header-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 40px;
    margin-bottom: 6px;
  }

  .header-row1-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .search-wrap {
    position: relative;
    min-width: 240px;
    max-width: 340px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px 7px 34px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  select {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    outline: none;
    cursor: pointer;
    transition: border-color .15s;
  }
  select:focus { border-color: var(--accent); }

  .stat-bar {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .stat-bar b { color: var(--accent2); font-weight: 500; }

  /* MAIN */
  main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px 24px;
  }

  /* SECTION GROUPS */
  .section-group {
    margin-bottom: 28px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .page-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    background: #dbeafe;
    color: #1e40af;
    border: 1px solid #bfdbfe;
  }

  .section-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--border2);
  }

  /* CARD GRID */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }

  /* FIELD CARD */
  .field-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color .15s, transform .1s;
    cursor: pointer;
    position: relative;
  }

  .field-card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
  }

  .field-card.expanded {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
    grid-column: span 2;
  }

  @media (max-width: 700px) {
    .field-card.expanded { grid-column: span 1; }
  }

  .card-top {
    padding: 12px 14px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .field-type-icon {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    text-align: center;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .ft-text   { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
  .ft-drop   { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  .ft-date   { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
  .ft-num    { background: #ede9fe; color: #5b21b6; border: 1px solid #ddd6fe; }
  .ft-bool   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .ft-att    { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
  .ft-ref    { background: #ccfbf1; color: #115e59; border: 1px solid #99f6e4; }

  .card-meta { flex: 1; min-width: 0; }

  .field-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .subsection-name {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 0 14px 10px;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 400;
    white-space: nowrap;
  }

  .b-mandatory  { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .b-optional   { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
  .b-editable   { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  .b-readonly   { background: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }
  .b-visible    { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
  .b-prefilled  { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
  .b-source     { background: #f8fafc; color: var(--muted); border: 1px solid var(--border); }

  .card-info {
    padding: 0 14px 10px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    display: none;
  }

  .field-card.expanded .card-info { display: block; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
    margin-top: 8px;
  }

  .info-item label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--border2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .info-item p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .info-item p.highlight { color: var(--text); }

  .choices-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .choice-pill {
    background: #f0f4ff;
    border: 1px solid #c7d4f8;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    color: #2c5fe0;
    font-family: var(--mono);
  }

  .expand-hint {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--border2);
    padding: 0 14px 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .expand-hint svg { width: 10px; height: 10px; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    grid-column: 1 / -1;
  }

  /* HIGHLIGHT */
  mark {
    background: #fef08a;
    color: #713f12;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .logo { color: var(--accent); }
  .logo span { color: var(--muted); }
</style>
</head>

<script>

let RAW = [];

async function loadChangesJSON() {

    const candidates = [
        './fieldunification.json',
        './GeneratedJson/fieldunification.json'
    ];

    for (const path of candidates) {

        try {

            const resp = await fetch(path, {
                cache: 'no-cache'
            });

            if (!resp.ok) continue;

            const json = await resp.json();

            if (Array.isArray(json)) {

                RAW = json.flatMap(sheet => {

                    if (!sheet.data) return [];

                    const rows = sheet.data;

                    const headers = rows[0];

                    return rows.slice(1).map(row => {

                        const obj = {};

                        headers.forEach((h, i) => {
                            obj[h] = row[i];
                        });

                        return obj;
                    });
                });

            } else {

                RAW = [
                    ...(json.registration || []),
                    ...(json.profile || []),
                    ...(json.trackrecords || [])
                ];
            }

            console.log("Dynamic RAW loaded:", RAW);

            render();

            return;

        } catch (e) {

            console.warn("Failed:", path);
        }
    }

    console.error("No JSON file found.");
}

loadChangesJSON();

function typeClass(ft) {
  ft = (ft || '').toLowerCase();
  if (ft.includes('dropdown')) return ['ft-drop', 'DROP'];
  if (ft.includes('checkbox')) return ['ft-bool', 'BOOL'];
  if (ft.includes('date')) return ['ft-date', 'DATE'];
  if (ft.includes('number') || ft.includes('integer') || ft.includes('decimal')) return ['ft-num', 'NUM'];
  if (ft.includes('attachment')) return ['ft-att', 'FILE'];
  if (ft.includes('reference') || ft.includes('calculated')) return ['ft-ref', 'REF'];
  return ['ft-text', 'TEXT'];
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(text).replace(new RegExp(safe, 'gi'), m => `<mark>${m}</mark>`);
}

function matchesSearch(row, q) {
  if (!q) return true;
  const haystack = [
    row.Field, row.Section, row.Subsection, row.Page,
    row['Field Type (BA)'], row['Additional Info / Logic'],
    row['Validation on current value entered'], row['Source (R1)'],
    row.Remarks, row['Choices (Only for dropdown)']
  ].join(' ').toLowerCase();
  return haystack.includes(q.toLowerCase());
}

function groupBy(arr, key) {
  const map = new Map();
  arr.forEach(r => {
    const k = r[key] || '—';
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(r);
  });
  return map;
}

let expandedCard = null;

function renderCard(row, q) {
  const [cls, label] = typeClass(row['Field Type (BA)']);
  const isMandatory = row['Mandatory'] === 'Yes';
  const isEditable = (row['Edit'] || '').toLowerCase().includes('yes');
  const isPrefilled = (row['Fill Type (R1)'] || '').toLowerCase().includes('pre-filled');
  const source = row['Source (R1)'] || '';
  const fieldId = `card-${row.Field}-${row.Section}`.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'');

  const choices = (row['Choices (Only for dropdown)'] || '').trim()
    .replace(/^NA$/i,'').split(/\n|,\s*/).map(s=>s.trim()).filter(s=>s && s.length < 60 && s !== 'NA');

  const info = row['Additional Info / Logic'] || '';
  const validation = row['Validation on current value entered'] || '';
  const editCond = row['Edit Condition'] || '';
  const visibleCond = row['Visible Condition'] || '';
  const remarks = row.Remarks || '';

  return `<div class="field-card" id="${esc(fieldId)}" onclick="toggleCard('${esc(fieldId)}')">
    <div class="card-top">
      <div class="field-type-icon ${cls}">${label}</div>
      <div class="card-meta">
        <div class="field-name">${highlight(row.Field || '—', q)}</div>
        <div class="subsection-name">${highlight(row.Subsection && row.Subsection !== '-' ? row.Subsection : row.Section, q)}</div>
      </div>
    </div>
    <div class="card-badges">
      ${isMandatory ? '<span class="badge b-mandatory">mandatory</span>' : '<span class="badge b-optional">optional</span>'}
      ${isEditable ? '<span class="badge b-editable">editable</span>' : '<span class="badge b-readonly">read-only</span>'}
      ${isPrefilled ? '<span class="badge b-prefilled">pre-filled</span>' : ''}
      ${source && source !== 'NA' ? `<span class="badge b-source">${esc(source)}</span>` : ''}
    </div>
    <div class="expand-hint">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4l3 3 3-3"/>
      </svg>
      click to expand
    </div>
    <div class="card-info">
      <div class="info-grid">
        ${info && info !== 'NA' ? `<div class="info-item" style="grid-column:1/-1"><label>Logic / notes</label><p>${highlight(info, q)}</p></div>` : ''}
        ${validation && validation !== 'NA' ? `<div class="info-item"><label>Validation</label><p class="highlight">${highlight(validation, q)}</p></div>` : ''}
        ${editCond ? `<div class="info-item"><label>Edit condition</label><p>${highlight(editCond, q)}</p></div>` : ''}
        ${visibleCond ? `<div class="info-item" style="grid-column:1/-1"><label>Visible condition</label><p>${highlight(visibleCond, q)}</p></div>` : ''}
        ${row['Table name'] ? `<div class="info-item"><label>DB table</label><p class="highlight">${esc(row['Table name'])}</p></div>` : ''}
        ${row['Field name'] ? `<div class="info-item"><label>DB field</label><p class="highlight">${esc(row['Field name'])}</p></div>` : ''}
        ${row['Field Type'] ? `<div class="info-item"><label>DB type</label><p>${esc(row['Field Type'])}</p></div>` : ''}
        ${row['Source (Proposed R3)'] ? `<div class="info-item"><label>Source R3</label><p>${esc(row['Source (Proposed R3)'])}</p></div>` : ''}
        ${row['Business Validations required'] && row['Business Validations required'] !== 'Nil' ? `<div class="info-item" style="grid-column:1/-1"><label>Business validation</label><p>${highlight(row['Business Validations required'], q)}</p></div>` : ''}
        ${remarks ? `<div class="info-item" style="grid-column:1/-1"><label>Remarks</label><p>${highlight(remarks, q)}</p></div>` : ''}
      </div>
      ${choices.length > 0 ? `<div style="margin-top:10px"><label style="display:block;font-family:var(--mono);font-size:10px;color:var(--border2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Choices (${choices.length})</label><div class="choices-list">${choices.slice(0,20).map(c=>`<span class="choice-pill">${esc(c)}</span>`).join('')}${choices.length>20?`<span class="choice-pill">+${choices.length-20} more</span>`:''}</div></div>` : ''}
    </div>
  </div>`;
}

function toggleCard(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const wasExpanded = el.classList.contains('expanded');
  if (expandedCard && expandedCard !== el) {
    expandedCard.classList.remove('expanded');
    const hint = expandedCard.querySelector('.expand-hint');
    if (hint) hint.innerHTML = `<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l3 3 3-3"/></svg> click to expand`;
  }
  el.classList.toggle('expanded', !wasExpanded);
  const hint = el.querySelector('.expand-hint');
  if (hint) hint.innerHTML = !wasExpanded
    ? `<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6l3-3 3 3"/></svg> collapse`
    : `<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l3 3 3-3"/></svg> click to expand`;
  expandedCard = !wasExpanded ? el : null;
}

function render() {
  const q = document.getElementById('search').value.trim();
  const filterPage = document.getElementById('filter-page').value;
  const filterSection = document.getElementById('filter-section').value;
  const filterMandatory = document.getElementById('filter-mandatory').value;
  const filterType = document.getElementById('filter-type').value;
  const sortBy = document.getElementById('sort-by').value;

  let rows = RAW.filter(r => {
    if (filterPage && r.Page !== filterPage) return false;
    if (filterSection && r.Section !== filterSection) return false;
    if (filterMandatory && r.Mandatory !== filterMandatory) return false;
    if (filterType && !r['Field Type (BA)'].toLowerCase().includes(filterType.toLowerCase())) return false;
    if (!matchesSearch(r, q)) return false;
    return true;
  });

  if (sortBy === 'field-az') rows.sort((a,b) => a.Field.localeCompare(b.Field));
  else if (sortBy === 'field-za') rows.sort((a,b) => b.Field.localeCompare(a.Field));
  else if (sortBy === 'mandatory') rows.sort((a,b) => (b.Mandatory==='Yes'?1:0) - (a.Mandatory==='Yes'?1:0));

  document.getElementById('count-shown').textContent = rows.length;

  const output = document.getElementById('output');

  if (rows.length === 0) {
    output.innerHTML = `<div class="card-grid"><div class="empty">no fields match your filters</div></div>`;
    return;
  }

  // Group by page + section
  const grouped = new Map();
  rows.forEach(r => {
    const key = `${r.Page}__${r.Section}`;
    if (!grouped.has(key)) grouped.set(key, { page: r.Page, section: r.Section, rows: [] });
    grouped.get(key).rows.push(r);
  });

  let html = '';
  grouped.forEach(({ page, section, rows: srows }) => {
    html += `<div class="section-group">
      <div class="section-header">
        <span class="section-label">${esc(section)}</span>
        <span class="page-badge">${esc(page)}</span>
        <span class="section-count">${srows.length} field${srows.length!==1?'s':''}</span>
      </div>
      <div class="card-grid">
        ${srows.map(r => renderCard(r, q)).join('')}
      </div>
    </div>`;
  });

  output.innerHTML = html;
}

['search','filter-page','filter-section','filter-mandatory','filter-type','sort-by']
  .forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener(id === 'search' ? 'input' : 'change', render);
  });

/* render() now called dynamically */
</script>
</body>
</html>
